<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus AI — Advanced Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--surface:#0e1520;--surface2:#141d2e;--surface3:#1a2438;--border:rgba(99,160,255,0.12);--border2:rgba(99,160,255,0.22);--accent:#4f8fff;--accent2:#7eb4ff;--text:#e8edf8;--muted:#7a8ba8;--success:#4ade80;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;}
.light{--bg:#f0f4ff;--surface:#ffffff;--surface2:#e8eef8;--surface3:#dde5f5;--border:rgba(79,143,255,0.15);--border2:rgba(79,143,255,0.3);--text:#0f1828;--muted:#5a6a88;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background 0.3s,color 0.3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,143,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,143,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(8,12,20,0.9);backdrop-filter:blur(12px);}
.light header{background:rgba(240,244,255,0.92);}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2;}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-0.02em;}
.logo-text span{color:var(--accent2);}
.header-right{display:flex;align-items:center;gap:8px;}
.pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:rgba(79,143,255,0.06);font-size:11px;color:var(--muted);font-family:var(--mono);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.15s;}
.icon-btn:hover{background:var(--surface2);color:var(--text);}
.icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
.layout{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}
.sidebar{width:210px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;padding:12px 8px;gap:3px;flex-shrink:0;}
@media(max-width:680px){.sidebar{position:absolute;top:0;bottom:0;left:0;z-index:20;transform:translateX(-100%);transition:transform 0.25s;} .sidebar.open{transform:translateX(0);}}
.slabel{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;padding:8px 8px 4px;}
.mode-btn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;cursor:pointer;width:100%;text-align:left;transition:all 0.15s;}
.mode-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
.mode-btn:hover{background:var(--surface2);color:var(--text);}
.mode-btn.active{background:rgba(79,143,255,0.12);color:var(--accent2);border:1px solid var(--border2);}
.sdivider{height:1px;background:var(--border);margin:8px 0;}
.hist-item{padding:6px 10px;border-radius:7px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.12s;}
.hist-item:hover{background:var(--surface2);color:var(--text);}
.clear-btn{margin-top:auto;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,94,94,0.25);background:transparent;color:#ff5e5e;font-family:var(--font);font-size:12px;cursor:pointer;transition:all 0.15s;}
.clear-btn:hover{background:rgba(255,94,94,0.08);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.messages{flex:1;overflow-y:auto;padding:24px 16px 10px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.welcome{text-align:center;padding:36px 20px 16px;animation:fadeUp 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.welcome h1{font-size:24px;font-weight:600;letter-spacing:-0.03em;margin-bottom:8px;}
.welcome h1 span{color:var(--accent2);}
.welcome p{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6;}
.suggestions{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:520px;margin:0 auto;}
.sugg{padding:7px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:var(--font);}
.sugg:hover{border-color:var(--accent);color:var(--accent2);background:rgba(79,143,255,0.06);}
.msg{display:flex;gap:10px;animation:fadeUp 0.25s ease;max-width:700px;width:100%;margin:0 auto;}
.msg.user{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.av.bot{background:var(--accent);}
.av.bot svg{width:13px;height:13px;stroke:white;fill:none;stroke-width:2;}
.av.user{background:var(--surface3);border:1px solid var(--border2);font-size:10px;font-weight:600;color:var(--accent2);}
.bubble{max-width:76%;padding:10px 14px;border-radius:12px;font-size:13.5px;line-height:1.7;}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg.user .bubble{background:var(--surface3);border:1px solid rgba(99,160,255,0.18);border-bottom-right-radius:3px;}
.typing-dots{display:flex;gap:4px;padding:3px 0;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.3s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.input-area{padding:10px 16px 14px;border-top:1px solid var(--border);background:rgba(8,12,20,0.92);backdrop-filter:blur(10px);}
.light .input-area{background:rgba(240,244,255,0.92);}
.privacy-bar{background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.18);border-radius:8px;padding:7px 13px;font-size:12px;color:#4ade80;display:flex;align-items:center;gap:7px;max-width:700px;margin:0 auto 8px;}
.privacy-bar svg{width:13px;height:13px;stroke:#4ade80;fill:none;stroke-width:2;flex-shrink:0;}
.rate-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 13px;display:flex;align-items:center;gap:10px;max-width:700px;margin:0 auto 8px;font-size:12px;color:var(--muted);}
.rate-fill{flex:1;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.rate-prog{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:8px 10px;transition:border-color 0.15s;max-width:700px;margin:0 auto;}
.input-row:focus-within{border-color:var(--accent);}
.tool-btn{width:26px;height:26px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.tool-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.tool-btn:hover{background:var(--surface2);color:var(--accent2);}
.tool-btn.active{color:var(--accent);}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13.5px;line-height:1.5;resize:none;min-height:22px;max-height:140px;}
textarea::placeholder{color:var(--muted);}
.send-btn{width:32px;height:32px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.send-btn svg{width:13px;height:13px;stroke:white;fill:none;stroke-width:2;}
.send-btn:hover{background:#3a7ae8;transform:scale(1.04);}
.send-btn:disabled{background:var(--surface2);cursor:not-allowed;transform:none;}
.input-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;max-width:700px;margin-left:auto;margin-right:auto;}
.meta-left{font-size:11px;color:var(--muted);font-family:var(--mono);}
.mode-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(79,143,255,0.1);color:var(--accent2);font-family:var(--mono);}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg></div>
    <div class="logo-text">Nexus<span> AI</span></div>
  </div>
  <div class="header-right">
    <div class="pill"><span class="dot"></span>online</div>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"><svg id="ti" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    <button class="icon-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" title="Menu"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </div>
</header>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="slabel">Mode</div>
    <button class="mode-btn active" id="mb-chat" onclick="setMode('chat',this)"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</button>
    <button class="mode-btn" id="mb-image" onclick="setMode('image',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Image Gen</button>
    <button class="mode-btn" id="mb-translate" onclick="setMode('translate',this)"><svg viewBox="0 0 24 24"><path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/></svg>Translate</button>
    <button class="mode-btn" id="mb-write" onclick="setMode('write',this)"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Writer</button>
    <div class="sdivider"></div>
    <div class="slabel">History</div>
    <div id="hist"></div>
    <button class="clear-btn" onclick="clearHist()">Clear history</button>
  </div>
  <div class="main">
    <div class="messages" id="msgs">
      <div class="welcome" id="welcome">
        <h1>Welcome to <span>Nexus AI</span></h1>
        <p>Advanced AI platform — chat, translate, write & generate images</p>
        <div class="suggestions">
          <button class="sugg" onclick="quickAsk(this)">Explain machine learning</button>
          <button class="sugg" onclick="quickAsk(this)">Write a cover letter</button>
          <button class="sugg" onclick="quickAsk(this)">Generate: futuristic city at night</button>
          <button class="sugg" onclick="quickAsk(this)">Translate to Urdu: Good morning</button>
          <button class="sugg" onclick="quickAsk(this)">Help me code a website</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="privacy-bar"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Privacy mode — chats are never stored on any server</div>
      <div class="rate-bar" ><svg style="width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="rate-txt">20 messages remaining today</span><div class="rate-fill"><div class="rate-prog" id="rate-prog"></div></div></div>
      <div class="input-row">
        <button class="tool-btn" id="voice-btn" onclick="toggleVoice()" title="Voice input"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
        <textarea id="inp" rows="1" placeholder="Ask anything, describe an image, translate text…"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
      <div class="input-meta"><span class="meta-left">nexus-ai · powered by claude</span><span class="mode-tag" id="mtag">chat mode</span></div>
    </div>
  </div>
</div>
<script>
const API_KEY='YOUR_ANTHROPIC_API_KEY_HERE';
const LIMIT=50;
let history=[],mode='chat',loading=false,recognition=null,isListening=false;
const msgsEl=document.getElementById('msgs');
const inpEl=document.getElementById('inp');
const sendBtn=document.getElementById('send-btn');

function getRateData(){try{const d=localStorage.getItem('nx_rate');return d?JSON.parse(d):null;}catch(e){return null;}}
function initRate(){const today=new Date().toDateString();let d=getRateData();if(!d||d.date!==today)d={date:today,count:0};const r=Math.max(0,LIMIT-d.count);document.getElementById('rate-txt').textContent=r+' messages remaining today';document.getElementById('rate-prog').style.width=(r/LIMIT*100)+'%';}
function useRate(){const today=new Date().toDateString();let d=getRateData();if(!d||d.date!==today)d={date:today,count:0};d.count++;try{localStorage.setItem('nx_rate',JSON.stringify(d));}catch(e){}const r=Math.max(0,LIMIT-d.count);document.getElementById('rate-txt').textContent=r+' messages remaining today';document.getElementById('rate-prog').style.width=(r/LIMIT*100)+'%';return d.count<=LIMIT;}

function toggleTheme(){document.body.classList.toggle('light');const l=document.body.classList.contains('light');document.getElementById('ti').innerHTML=l?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';try{localStorage.setItem('nx_theme',l?'light':'dark');}catch(e){}}

const modeCfg={chat:{tag:'chat mode',ph:'Ask me anything…'},image:{tag:'image mode',ph:'Describe the image you want…'},translate:{tag:'translate mode',ph:'e.g. "to Urdu: Hello world"…'},write:{tag:'writer mode',ph:'Describe what you want me to write…'}};
function setMode(m,btn){mode=m;history=[];document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('mtag').textContent=modeCfg[m].tag;inpEl.placeholder=modeCfg[m].ph;}

function saveSess(t){try{let s=JSON.parse(localStorage.getItem('nx_sess')||'[]');s.unshift({id:Date.now(),title:t.slice(0,38)});s=s.slice(0,12);localStorage.setItem('nx_sess',JSON.stringify(s));renderHist();}catch(e){}}
function renderHist(){try{const s=JSON.parse(localStorage.getItem('nx_sess')||'[]');document.getElementById('hist').innerHTML=s.map(x=>`<div class="hist-item" title="${x.title}">${x.title}</div>`).join('');}catch(e){}}
function clearHist(){try{localStorage.removeItem('nx_sess');}catch(e){}renderHist();}

function scroll(){msgsEl.scrollTop=msgsEl.scrollHeight;}
function rmWelcome(){const w=document.getElementById('welcome');if(w)w.remove();}
function addMsg(text,role){rmWelcome();const w=document.createElement('div');w.className='msg '+role;const botAv='<div class="av bot"><svg viewBox="0 0 24 24" stroke-width="2" stroke="white" fill="none"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></div>';const userAv='<div class="av user">You</div>';const b=`<div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;w.innerHTML=role==='bot'?botAv+b:b+userAv;msgsEl.appendChild(w);scroll();}
function showTyping(){const w=document.createElement('div');w.className='msg bot';w.id='typing';w.innerHTML='<div class="av bot"><svg viewBox="0 0 24 24" stroke-width="2" stroke="white" fill="none"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';msgsEl.appendChild(w);scroll();}
function rmTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function sendMsg(){
  const text=inpEl.value.trim();
  if(!text||loading)return;
  if(!useRate()){addMsg('Daily limit reached ('+LIMIT+' messages). Come back tomorrow! 🔄','bot');return;}
  loading=true;sendBtn.disabled=true;
  inpEl.value='';inpEl.style.height='auto';
  if(history.length===0)saveSess(text);
  addMsg(text,'user');
  history.push({role:'user',content:text});
  showTyping();
  try{
    const sys={
      chat:'You are Nexus AI, a helpful and intelligent assistant. Be concise and genuinely helpful. Respond in the same language the user writes in.',
      image:'You are Nexus AI image assistant. The user describes an image. First write: "✨ Enhanced prompt:" then give a detailed image generation prompt. Then write "🖼 What this image would show:" and describe it vividly in 2-3 sentences. Note that actual image generation requires an image API (like DALL-E). Encourage them to add an image API.',
      translate:'You are Nexus AI translation assistant. Translate accurately. If user says "to [lang]: [text]" translate to that language. If no target language given, detect source and translate to English. Show original and translation clearly.',
      write:'You are Nexus AI writing assistant. Help write emails, essays, stories, cover letters, captions. Be creative and professional.'
    };
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys[mode]||sys.chat,messages:history})});
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('')||'Something went wrong. Please try again.';
    rmTyping();addMsg(reply,'bot');
    history.push({role:'assistant',content:reply});
  }catch(e){rmTyping();addMsg('Connection error. Please check your internet.','bot');}
  loading=false;sendBtn.disabled=false;inpEl.focus();
}

function quickAsk(btn){
  const t=btn.textContent;
  if(t.startsWith('Generate:'))setMode('image',document.getElementById('mb-image'));
  else if(t.startsWith('Translate'))setMode('translate',document.getElementById('mb-translate'));
  inpEl.value=t;sendMsg();
}

function toggleVoice(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){addMsg('Voice input needs Chrome browser. Please open Nexus AI in Chrome!','bot');return;}
  if(isListening){recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='en-US';recognition.interimResults=false;
  recognition.onstart=()=>{isListening=true;document.getElementById('voice-btn').classList.add('active');inpEl.placeholder='Listening… speak now';};
  recognition.onresult=(e)=>{inpEl.value=e.results[0][0].transcript;};
  recognition.onend=()=>{isListening=false;document.getElementById('voice-btn').classList.remove('active');inpEl.placeholder=modeCfg[mode].ph;};
  recognition.start();
}

inpEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
inpEl.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,140)+'px';});

initRate();renderHist();
try{if(localStorage.getItem('nx_theme')==='light')toggleTheme();}catch(e){}
</script>
</body>
</html>
